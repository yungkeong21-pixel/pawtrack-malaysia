const defaults={pets:[{id:'milo',name:'Milo',species:'cat',birth:'2025-07-21'},{id:'luna',name:'Luna',species:'cat',birth:'2023-07-21'}],records:[{id:'1',petId:'milo',type:'flea',details:'Frontline Plus',date:'2026-07-01',nextDate:'2026-07-22'},{id:'2',petId:'milo',type:'vaccine',details:'FVRCP',date:'2025-08-08',nextDate:'2026-08-08'},{id:'3',petId:'milo',type:'weight',details:'4.8 kg',date:'2026-07-20',nextDate:''}]};let data=JSON.parse(localStorage.pawtrackData||'null')||defaults;let active=localStorage.activePet||data.pets[0].id;const icons={flea:'🛡️',deworm:'🪱',vaccine:'💉',medicine:'💊',vet:'🩺',weight:'⚖️',symptom:'📝'},names={flea:'跳蚤预防',deworm:'驱虫',vaccine:'疫苗',medicine:'药物',vet:'看兽医',weight:'体重记录',symptom:'症状'};function save(){localStorage.pawtrackData=JSON.stringify(data);localStorage.activePet=active;render()}function age(b){if(!b)return'';const y=Math.max(0,new Date().getFullYear()-new Date(b).getFullYear());return y+'岁'}function due(d){if(!d)return'';const days=Math.ceil((new Date(d+'T00:00:00')-new Date().setHours(0,0,0,0))/86400000);return days===0?'今天':days===1?'明天':days<0?`逾期 ${-days} 天`:new Date(d+'T00:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short'})}function render(){const pets=document.querySelector('#pets');pets.innerHTML=data.pets.map(p=>`<button class="pet ${p.id===active?'active':''}" data-pet="${p.id}"><span class="avatar">${p.species==='dog'?'🐕':'🐈'}</span><b>${p.name.replace(/[<>]/g,'')}</b><small>${age(p.birth)}</small></button>`).join('')+'<button class="pet" id="addPet"><span class="avatar">＋</span><b>添加宠物</b></button>';pets.querySelectorAll('[data-pet]').forEach(b=>b.onclick=()=>{active=b.dataset.pet;save()});document.querySelector('#addPet').onclick=()=>open('petForm');const rs=data.records.filter(r=>r.petId===active).sort((a,b)=>(a.nextDate||a.date).localeCompare(b.nextDate||b.date));document.querySelector('#events').innerHTML=rs.length?rs.map(r=>`<article class="event"><div class="icon">${icons[r.type]||'📝'}</div><main><b>${names[r.type]||r.type}</b><small>${(r.details||'').replace(/[<>]/g,'')} · ${r.date}</small></main><span class="due">${due(r.nextDate)}</span></article>`).join(''):'<div class="empty">还没有记录，点击下方按钮开始。</div>'}function open(id){document.querySelector('#'+id).classList.add('open')}function shut(id){document.querySelector('#'+id).classList.remove('open')}const sheet=document.querySelector('#sheet');document.querySelector('#add').onclick=()=>sheet.classList.add('open');document.querySelector('#close').onclick=()=>shut('sheet');sheet.querySelectorAll('.choice').forEach((b,i)=>b.onclick=()=>{shut('sheet');const types=['vaccine','medicine','vet','symptom'];document.querySelector('#recordFormEl [name=type]').value=types[i];open('recordForm')});document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>shut(b.dataset.close));document.querySelectorAll('.sheet').forEach(s=>s.onclick=e=>{if(e.target===s)shut(s.id)});document.querySelector('#petFormEl').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target),id=crypto.randomUUID();data.pets.push({id,name:f.get('name'),species:f.get('species'),birth:f.get('birth')});active=id;save();e.target.reset();shut('petForm')};document.querySelector('#recordFormEl [name=date]').value=new Date().toISOString().slice(0,10);document.querySelector('#recordFormEl').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target);data.records.push({id:crypto.randomUUID(),petId:active,type:f.get('type'),details:f.get('details'),date:f.get('date'),nextDate:f.get('nextDate')});save();e.target.reset();e.target.querySelector('[name=date]').value=new Date().toISOString().slice(0,10);shut('recordForm')};document.querySelector('#lang').onchange=e=>{document.documentElement.lang=e.target.value;document.querySelectorAll('[data-t]').forEach(x=>x.textContent=copy[e.target.value][x.dataset.t]||x.textContent);localStorage.lang=e.target.value};const saved=localStorage.lang||'zh';document.querySelector('#lang').value=saved;document.querySelector <script>
function editPet(id){const p=id?data.pets.find(x=>x.id===id):null,form=document.querySelector('#petFormEl');form.reset();form.elements.id.value=p?.id||'';form.elements.name.value=p?.name||'';form.elements.species.value=p?.species||'cat';form.elements.birth.value=p?.birth||'';document.querySelector('#petFormTitle').textContent=p?'修改宠物资料':'添加宠物';document.querySelector('#deletePet').classList.toggle('show',!!p);open('petForm')}
render=function(){const pets=document.querySelector('#pets');pets.innerHTML=data.pets.map(p=>`<button class="pet ${p.id===active?'active':''}" data-pet="${p.id}"><span class="avatar">${p.species==='dog'?'🐕':p.species==='other'?'🐾':'🐈'}</span><b>${p.name.replace(/[<>]/g,'')}</b><small>${age(p.birth)}</small></button>`).join('')+'<button class="pet" id="addPet"><span class="avatar">＋</span><b>添加宠物</b></button>';pets.querySelectorAll('[data-pet]').forEach(b=>b.onclick=()=>{active=b.dataset.pet;save()});document.querySelector('#addPet').onclick=()=>editPet();const rs=data.records.filter(r=>r.petId===active).sort((a,b)=>(a.nextDate||a.date).localeCompare(b.nextDate||b.date));document.querySelector('#events').innerHTML=rs.length?rs.map(r=>`<article class="event"><div class="icon">${icons[r.type]||'📝'}</div><main><b>${names[r.type]||r.type}</b><small>${(r.details||'').replace(/[<>]/g,'')} · ${r.date}</small></main><span class="due">${due(r.nextDate)}</span></article>`).join(''):'<div class="empty">还没有记录，点击下方按钮开始。</div>'}
document.querySelector('#managePet').onclick=()=>editPet(active);
document.querySelector('#petFormEl').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target),existing=f.get('id');if(existing){const p=data.pets.find(x=>x.id===existing);p.name=f.get('name');p.species=f.get('species');p.birth=f.get('birth')}else{const id=crypto.randomUUID();data.pets.push({id,name:f.get('name'),species:f.get('species'),birth:f.get('birth')});active=id}save();e.target.reset();shut('petForm')};

render();

const lang=()=>localStorage.lang||'zh',u=k=>ui[lang()][k]||k;
age=function(b){if(!b)return'';const y=Math.max(0,new Date().getFullYear()-new Date(b).getFullYear());return lang()==='en'?y+' '+u('year')+(y===1?'':'s'):y+' '+u('year')};
due=function(d){if(!d)return'';const days=Math.ceil((new Date(d+'T00:00:00')-new Date().setHours(0,0,0,0))/86400000);return days===0?u('today'):days===1?u('tomorrow'):days<0?u('overdue').replace('{n}',-days):new Date(d+'T00:00:00').toLocaleDateString(lang()==='zh'?'zh-CN':lang()==='ms'?'ms-MY':'en-MY',{day:'numeric',month:'short'})};
editPet=function(id){const p=id?data.pets.find(x=>x.id===id):null,form=document.querySelector('#petFormEl');form.reset();form.elements.id.value=p?.id||'';form.elements.name.value=p?.name||'';form.elements.species.value=p?.species||'cat';form.elements.birth.value=p?.birth||'';document.querySelector('#petFormTitle').textContent=p?u('editPet'):u('addPet');document.querySelector('#deletePet').classList.toggle('show',!!p);open('petForm')};
render=function(){const pets=document.querySelector('#pets');pets.innerHTML=data.pets.map(p=>`<button class="pet ${p.id===active?'active':''}" data-pet="${p.id}"><span class="avatar">${p.species==='dog'?'🐕':p.species==='other'?'🐾':'🐈'}</span><b>${p.name.replace(/[<>]/g,'')}</b><small>${age(p.birth)}</small></button>`).join('')+`<button class="pet" id="addPet"><span class="avatar">＋</span><b>${u('addPet')}</b></button>`;pets.querySelectorAll('[data-pet]').forEach(b=>b.onclick=()=>{active=b.dataset.pet;save()});document.querySelector('#addPet').onclick=()=>editPet();const rs=data.records.filter(r=>r.petId===active).sort((a,b)=>(a.nextDate||a.date).localeCompare(b.nextDate||b.date));document.querySelector('#events').innerHTML=rs.length?rs.map(r=>`<article class="event"><div class="icon">${icons[r.type]||'📝'}</div><main><b>${u(r.type)}</b><small>${(r.details||'').replace(/[<>]/g,'')} · ${r.date}</small></main><span class="due">${due(r.nextDate)}</span></article>`).join(''):`<div class="empty">${u('empty')}</div>`};
document.querySelector('#deletePet').onclick=()=>{const id=document.querySelector('#petFormEl').elements.id.value,p=data.pets.find(x=>x.id===id);if(data.pets.length===1)return alert(u('keepOne'));if(!p||!confirm(u('confirmDelete').replace('{name}',p.name)))return;data.pets=data.pets.filter(x=>x.id!==id);data.records=data.records.filter(r=>r.petId!==id);active=data.pets[0].id;save();shut('petForm')};
function applyTheme(theme){document.documentElement.dataset.theme=theme;localStorage.pawtrackTheme=theme;const dark=theme==='dark',button=document.querySelector('#themeToggle');button.textContent=dark?'☀️':'🌙';button.setAttribute('aria-label',u(dark?'lightMode':'darkMode'));document.querySelector('meta[name="theme-color"]').content=dark?'#0e1715':'#21655a'}
function applyLanguage(){document.documentElement.lang=lang()==='zh'?'zh-Hans':lang();document.querySelectorAll('[data-t]').forEach(x=>x.textContent=(copy[lang()]&&copy[lang()][x.dataset.t])||x.textContent);document.querySelectorAll('[data-ui]').forEach(x=>x.textContent=u(x.dataset.ui));const id=document.querySelector('#petFormEl').elements.id.value;if(document.querySelector('#petForm').classList.contains('open'))document.querySelector('#petFormTitle').textContent=id?u('editPet'):u('addPet');applyTheme(document.documentElement.dataset.theme);syncVaccineField();render()}
function syncVaccineField(){const form=document.querySelector('#recordFormEl'),isVaccine=form.elements.type.value==='vaccine',field=document.querySelector('#vaccineField'),select=document.querySelector('#vaccineSelect'),p=data.pets.find(x=>x.id===active);field.classList.toggle('show',isVaccine);document.querySelector('#detailsLabel').textContent=isVaccine?u('notes'):u('details');if(!isVaccine)return;const cat=[['FVRCP','FVRCP / 3-in-1'],['FeLV','FeLV'],['Rabies','Rabies']],dog=[['DHPP','DHPP / DHPPi / 5-in-1'],['Leptospirosis','Leptospirosis'],['Bordetella','Bordetella'],['Rabies','Rabies']],list=p?.species==='cat'?cat:p?.species==='dog'?dog:[...cat,...dog];select.innerHTML=list.concat([['other',u('otherVaccine')]]).map(([v,n])=>`<option value="${v}">${n}</option>`).join('')}document.querySelector('#recordFormEl [name=type]').onchange=syncVaccineField;const oldChoices=[...sheet.querySelectorAll('.choice')];oldChoices.forEach((b,i)=>b.onclick=()=>{shut('sheet');const types=['vaccine','medicine','vet','symptom'];document.querySelector('#recordFormEl [name=type]').value=types[i];syncVaccineField();open('recordForm')});document.querySelector('#recordFormEl').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target),type=f.get('type'),preset=document.querySelector('#vaccineSelect').value,notes=f.get('details').trim(),details=type==='vaccine'?(preset==='other'?(notes||u('otherVaccine')):(notes?`${preset} · ${notes}`:preset)):notes;data.records.push({id:crypto.randomUUID(),petId:active,type,details,date:f.get('date'),nextDate:f.get('nextDate')});save();e.target.reset();e.target.querySelector('[name=date]').value=new Date().toISOString().slice(0,10);syncVaccineField();shut('recordForm')};function summary(){const p=data.pets.find(x=>x.id===active),rs=data.records.filter(r=>r.petId===active).sort((a,b)=>b.date.localeCompare(a.date)),species=p.species==='cat'?u('catOption').replace(/^\S+\s/,''):p.species==='dog'?u('dogOption').replace(/^\S+\s/,''):u('otherOption').replace(/^\S+\s/,'');const lines=[u('summaryTitle'),'='.repeat(28),`${u('generated')}: ${new Date().toLocaleDateString()}`,`${u('pet')}: ${p.name}`,`${u('speciesLabel')}: ${species}`,`${u('birthLabel')}: ${p.birth||'-'}`,'',u('records'),'-'.repeat(28)];if(!rs.length)lines.push(u('noRecords'));else rs.forEach(r=>lines.push(`${r.date} · ${u(r.type)} · ${r.details||'-'}${r.nextDate?` · ${u('nextDue')}: ${r.nextDate}`:''}`));return lines.join('\n')}document.querySelector('#makeSummary').onclick=()=>{document.querySelector('#summaryText').textContent=summary();open('summarySheet')};document.querySelector('#copySummary').onclick=async()=>{await navigator.clipboard.writeText(summary());alert(u('copied'))};document.querySelector('#shareSummary').onclick=async()=>{const text=summary(),p=data.pets.find(x=>x.id===active);if(navigator.share)await navigator.share({title:`${u('vetSummary')} - ${p.name}`,text});else{await navigator.clipboard.writeText(text);alert(u('copied'))}};document.querySelector('#printSummary').onclick=()=>{const w=window.open('','_blank');w.document.write(`<!doctype html><meta charset="utf-8"><title>${u('vetSummary')}</title><style>body{font:15px/1.6 system-ui;margin:40px;white-space:pre-wrap;color:#17332f}h1{font-size:22px}</style><h1>${u('vetSummary')}</h1><div></div>`);w.document.querySelector('div').textContent=summary();w.document.close();w.print()};document.querySelector('#findVet').onclick=()=>{const button=document.querySelector('#findVet'),popup=window.open('about:blank','_blank');button.disabled=true;button.textContent=u('locating');navigator.geolocation.getCurrentPosition(pos=>{const q=encodeURIComponent(`veterinary clinic near ${pos.coords.latitude},${pos.coords.longitude}`);popup.location=`https://www.google.com/maps/search/?api=1&query=${q}`;button.disabled=false;button.textContent=u('findVet')},()=>{popup.close();button.disabled=false;button.textContent=u('findVet');alert(u('locationError'))},{enableHighAccuracy:false,timeout:10000,maximumAge:300000})};document.querySelector('#themeToggle').onclick=()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');document.querySelector('#lang').onchange=e=>{localStorage.lang=e.target.value;applyLanguage()};applyLanguage();
</script>
<script>
Object.assign(ui.zh,{deleteRecord:'删除记录',confirmDeleteRecord:'确定删除这条记录：{name}？'});Object.assign(ui.en,{deleteRecord:'Delete record',confirmDeleteRecord:'Delete this record: {name}?'});Object.assign(ui.ms,{deleteRecord:'Padam rekod',confirmDeleteRecord:'Padam rekod ini: {name}?'});
const renderWithRecords=render;render=function(){renderWithRecords();const rs=data.records.filter(r=>r.petId===active).sort((a,b)=>(a.nextDate||a.date).localeCompare(b.nextDate||b.date));document.querySelectorAll('#events .event').forEach((card,i)=>{const r=rs[i],button=document.createElement('button');button.type='button';button.className='record-delete';button.textContent='🗑️';button.title=u('deleteRecord');button.setAttribute('aria-label',u('deleteRecord'));button.onclick=()=>{if(confirm(u('confirmDeleteRecord').replace('{name}',r.details||u(r.type)))){data.records=data.records.filter(x=>x.id!==r.id);save()}};card.appendChild(button)})};render();

<script>
const dailyCopy={zh:{label:'💡 今日小知识',disclaimer:'仅供一般照护参考，不代替兽医诊断。',cat:['猫咪反复咳嗽并不正常，可能与哮喘、感染、寄生虫或心肺问题有关；若呼吸费力应尽快就医。','猫咪频繁进出猫砂盆却只能尿几滴，尤其是公猫，可能发生尿路阻塞，应当立即就医。','牙龈问题主要与牙菌斑累积有关；湿粮不能简单等同于牙龈发炎，定期检查和刷牙更重要。','猫咪很会隐藏疼痛。食欲、活动量、躲藏习惯或排泄突然改变，都值得留意。','即使只看到一只跳蚤，也可能代表环境里已有虫卵；所有同住宠物通常需要同步防护。','在家中不同位置放置多碗干净饮水，或使用饮水机，可能帮助部分猫咪增加饮水。','疫苗安排应按年龄、生活方式和外出风险由兽医制定，并不是所有猫都完全相同。'],dog:['狗狗持续咳嗽可能与呼吸道感染、气管、心脏或肺部问题有关；若呼吸困难应尽快就医。','每天刷牙是预防牙菌斑最有效的方法之一；做不到每天时，每周多次也有帮助。','巧克力、葡萄／葡萄干和含木糖醇的食品可能对狗有毒，应放在接触不到的位置。','炎热天气出现急促喘气、流口水、无力或意识异常，可能是中暑，需要紧急处理。','频繁甩头、抓耳或耳朵有异味，可能提示耳道发炎，应让兽医检查。','跳蚤和蜱虫防护需要按产品说明持续进行，外出活动多的狗尤其要规律检查。','疫苗计划会因年龄、地区和生活方式而不同，应由兽医评估核心及非核心疫苗。']},en:{label:'💡 Daily pet tip',disclaimer:'General care information only; not a veterinary diagnosis.',cat:['Repeated coughing in cats is not normal. Asthma, infection, parasites, or heart and lung disease are possible; laboured breathing needs urgent care.','Frequent litter-box visits with only drops of urine, especially in a male cat, may signal a urinary blockage and needs emergency care.','Gum disease is mainly linked to plaque buildup. Wet food alone does not automatically cause inflamed gums; dental checks and brushing matter more.','Cats often hide pain. Sudden changes in appetite, activity, hiding, or toileting deserve attention.','Seeing one flea can mean eggs are already in the environment; pets living together often need coordinated prevention.','Several bowls of fresh water in different locations, or a fountain, may encourage some cats to drink more.','Vaccination should be tailored by a vet to age, lifestyle, and outdoor exposure; not every cat follows exactly the same schedule.'],dog:['Ongoing coughing in dogs may involve infection, the airway, heart, or lungs; difficulty breathing needs urgent veterinary care.','Daily toothbrushing is one of the best ways to control plaque; brushing several times a week can still help.','Chocolate, grapes or raisins, and products containing xylitol can be toxic to dogs and should be kept out of reach.','Heavy panting, drooling, weakness, or confusion in hot weather may be heatstroke and needs emergency care.','Head shaking, ear scratching, or a bad smell can signal an ear problem that needs a veterinary check.','Flea and tick prevention should follow the product schedule; dogs that spend more time outdoors need regular checks.','Vaccination plans vary with age, region, and lifestyle; a vet should assess core and non-core vaccines.']},ms:{label:'💡 Tip haiwan hari ini',disclaimer:'Maklumat penjagaan umum sahaja; bukan diagnosis veterinar.',cat:['Batuk berulang pada kucing bukan perkara biasa. Asma, jangkitan, parasit atau masalah jantung dan paru-paru mungkin terlibat; sukar bernafas memerlukan rawatan segera.','Kerap masuk bekas pasir tetapi hanya keluar beberapa titis air kencing, terutama kucing jantan, mungkin tanda saluran kencing tersumbat dan merupakan kecemasan.','Penyakit gusi terutamanya berkaitan pengumpulan plak. Makanan basah sahaja tidak semestinya menyebabkan gusi radang; pemeriksaan gigi dan memberus lebih penting.','Kucing sering menyembunyikan kesakitan. Perubahan mendadak pada selera, aktiviti, tabiat bersembunyi atau membuang perlu diberi perhatian.','Seekor kutu yang kelihatan mungkin bermakna telur sudah ada di persekitaran; haiwan yang tinggal bersama biasanya memerlukan pencegahan serentak.','Beberapa mangkuk air bersih di lokasi berbeza, atau pancuran air, boleh menggalakkan sesetengah kucing minum lebih banyak.','Jadual vaksin perlu disesuaikan oleh vet mengikut umur, gaya hidup dan risiko keluar rumah; tidak semua kucing sama.'],dog:['Batuk berterusan pada anjing mungkin melibatkan jangkitan, saluran pernafasan, jantung atau paru-paru; sukar bernafas memerlukan rawatan segera.','Memberus gigi setiap hari ialah antara cara terbaik mengawal plak; beberapa kali seminggu juga boleh membantu.','Coklat, anggur atau kismis, dan produk yang mengandungi xylitol boleh menjadi toksik kepada anjing.','Tercungap-cungap, meleleh air liur, lemah atau keliru ketika cuaca panas mungkin tanda strok haba dan memerlukan rawatan kecemasan.','Kerap menggoyang kepala, menggaru telinga atau bau busuk boleh menandakan masalah telinga yang perlu diperiksa vet.','Pencegahan kutu perlu mengikut jadual produk; anjing yang kerap berada di luar memerlukan pemeriksaan berkala.','Pelan vaksin berbeza mengikut umur, kawasan dan gaya hidup; vet perlu menilai vaksin teras dan bukan teras.']}};
const renderWithTip=render;function updateDailyTip(){const p=data.pets.find(x=>x.id===active),set=dailyCopy[lang()]||dailyCopy.zh,list=p?.species==='dog'?set.dog:set.cat,day=Math.floor(new Date().setHours(0,0,0,0)/86400000);document.querySelector('#tipLabel').textContent=set.label;document.querySelector('#tipText').textContent=list[day%list.length];document.querySelector('#tipDisclaimer').textContent=set.disclaimer}render=function(){renderWithTip();updateDailyTip()};render();
</script></body></html>
