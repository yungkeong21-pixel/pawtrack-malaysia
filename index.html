<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#21655a">
  <link rel="manifest" href="manifest.webmanifest">
  <title>PawTrack</title>
  <style>
    :root{--ink:#17332f;--muted:#71817e;--green:#21655a;--mint:#dff4ea;--cream:#f8f5ed;--card:#fff;--warn:#c66c3d;--shadow:0 12px 34px #183d3514}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font:15px/1.45 Inter,system-ui,sans-serif}.app{max-width:520px;margin:auto;min-height:100vh;padding:22px 18px 96px}header{display:flex;align-items:center;justify-content:space-between}.brand{font-size:23px;font-weight:800;letter-spacing:-.5px}.brand span{color:var(--green)}button,input,select{font:inherit}.hero{margin:22px 0;background:linear-gradient(135deg,#21655a,#3f8d7e);color:white;padding:22px;border-radius:26px;box-shadow:var(--shadow)}.hero small{opacity:.8}.hero h1{font-size:27px;line-height:1.15;margin:7px 0}.petrow{display:flex;gap:11px;overflow:auto;padding:2px 0 16px}.pet{min-width:110px;border:2px solid transparent;background:white;border-radius:20px;padding:13px;text-align:left;box-shadow:var(--shadow)}.pet.active{border-color:var(--green)}.avatar{font-size:28px}.pet b,.pet small{display:block}.pet small{color:var(--muted)}h2{font-size:18px;margin:20px 2px 12px}.timeline{display:grid;gap:11px}.event{display:flex;align-items:center;gap:13px;background:white;padding:15px;border-radius:18px;box-shadow:var(--shadow)}.event .icon{display:grid;place-items:center;width:42px;height:42px;border-radius:14px;background:var(--mint);font-size:20px}.event main{flex:1}.event b,.event small{display:block}.event small{color:var(--muted)}.due{color:var(--warn);font-size:12px;font-weight:700}.empty{background:#ffffffaa;border:1px dashed #bdd0ca;border-radius:18px;padding:24px;text-align:center;color:var(--muted)}.fab{position:fixed;right:max(22px,calc((100vw - 520px)/2 + 22px));bottom:24px;border:0;border-radius:18px;background:var(--green);color:white;padding:15px 19px;font-weight:750;box-shadow:0 12px 28px #21655a55}.sheet{position:fixed;inset:0;background:#102b2766;display:none;align-items:end;justify-content:center;z-index:3}.sheet.open{display:flex}.panel{width:min(520px,100%);max-height:92vh;overflow:auto;background:var(--cream);border-radius:28px 28px 0 0;padding:22px}.panel h2{margin-top:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.choice{border:0;background:white;border-radius:17px;padding:18px 10px;text-align:center;box-shadow:var(--shadow)}.choice span{display:block;font-size:24px;margin-bottom:5px}.close,.primary{width:100%;margin-top:13px;border:0;padding:13px;border-radius:15px}.close{background:#e9e7df}.primary{background:var(--green);color:#fff;font-weight:750}.field{display:grid;gap:6px;margin:12px 0}.field label{font-size:13px;color:var(--muted);font-weight:650}.field input,.field select{width:100%;border:1px solid #dbe3df;background:#fff;border-radius:13px;padding:12px;color:var(--ink)}select{border:0;background:white;border-radius:12px;padding:9px;color:var(--ink)}
    .section-title{display:flex;align-items:center;justify-content:space-between;margin-top:20px}.section-title h2{margin:0 2px 12px}.manage{border:0;background:transparent;color:var(--green);font-weight:750;padding:4px 2px 12px}.danger{display:none;width:100%;margin-top:13px;border:0;padding:13px;border-radius:15px;background:#fbe7e2;color:#a9412d;font-weight:750}.danger.show{display:block}
  </style>
</head>
<body><div class="app">
  <header><div class="brand">Paw<span>Track</span></div><select id="lang" aria-label="Language"><option value="zh">中文</option><option value="en">English</option><option value="ms">BM</option></select></header>
  <section class="hero"><small data-t="hello">晚上好</small><h1 data-t="headline">今天的照护，都完成了吗？</h1><div data-t="summary">2 项即将到期 · 1 项已完成</div></section>
  <div class="section-title"><h2 data-t="pets">我的宠物</h2><button class="manage" id="managePet">管理</button></div><div class="petrow" id="pets"></div>
  <h2 data-t="upcoming">即将到期</h2><div class="timeline" id="events"></div>
</div><button class="fab" id="add" data-t="record">＋ 添加记录</button>
<div class="sheet" id="sheet"><div class="panel"><h2 data-t="what">记录什么？</h2><div class="grid"><button class="choice"><span>💉</span><b data-t="vaccine">疫苗</b></button><button class="choice"><span>💊</span><b data-t="medicine">药物</b></button><button class="choice"><span>🩺</span><b data-t="vet">看兽医</b></button><button class="choice"><span>📝</span><b data-t="symptom">症状</b></button></div><button class="close" id="close" data-t="cancel">取消</button></div></div>
<div class="sheet" id="petForm"><form class="panel" id="petFormEl"><h2 id="petFormTitle">添加宠物</h2><input name="id" type="hidden"><div class="field"><label data-t="petName">名字</label><input name="name" required maxlength="30"></div><div class="field"><label data-t="species">种类</label><select name="species"><option value="cat">🐈 Cat</option><option value="dog">🐕 Dog</option><option value="other">🐾 Other</option></select></div><div class="field"><label data-t="birth">出生日期</label><input name="birth" type="date"></div><button class="primary" data-t="save">保存</button><button class="danger" id="deletePet" type="button">移除这只宠物</button><button class="close" type="button" data-close="petForm" data-t="cancel">取消</button></form></div>
<div class="sheet" id="recordForm"><form class="panel" id="recordFormEl"><h2 data-t="newRecord">添加健康记录</h2><div class="field"><label data-t="type">类型</label><select name="type"><option value="flea">跳蚤预防</option><option value="deworm">驱虫</option><option value="vaccine">疫苗</option><option value="medicine">药物</option><option value="vet">看兽医</option><option value="weight">体重</option><option value="symptom">症状</option></select></div><div class="field"><label data-t="details">名称／备注</label><input name="details" maxlength="80" placeholder="Frontline Plus"></div><div class="field"><label data-t="date">记录日期</label><input name="date" type="date" required></div><div class="field"><label data-t="nextDate">下次到期（可选）</label><input name="nextDate" type="date"></div><button class="primary" data-t="save">保存</button><button class="close" type="button" data-close="recordForm" data-t="cancel">取消</button></form></div>
<script>
const copy={zh:{hello:'晚上好',headline:'今天的照护，都完成了吗？',summary:'2 项即将到期 · 1 项已完成',pets:'我的宠物',cat:'公猫 · 1岁',cat2:'母猫 · 3岁',addPet:'添加宠物',upcoming:'即将到期',flea:'跳蚤预防',tomorrow:'明天',vaccine:'疫苗加强针',weight:'体重记录',record:'＋ 添加记录',what:'记录什么？',medicine:'药物',vet:'看兽医',symptom:'症状',cancel:'取消'},en:{hello:'Good evening',headline:'Is today’s care all done?',summary:'2 due soon · 1 completed',pets:'My pets',cat:'Male cat · 1 year',cat2:'Female cat · 3 years',addPet:'Add pet',upcoming:'Coming up',flea:'Flea prevention',tomorrow:'Tomorrow',vaccine:'Vaccine booster',weight:'Weight record',record:'＋ Add record',what:'What would you like to log?',medicine:'Medication',vet:'Vet visit',symptom:'Symptom',cancel:'Cancel'},ms:{hello:'Selamat malam',headline:'Penjagaan hari ini sudah selesai?',summary:'2 akan tiba · 1 selesai',pets:'Haiwan saya',cat:'Kucing jantan · 1 tahun',cat2:'Kucing betina · 3 tahun',addPet:'Tambah haiwan',upcoming:'Akan datang',flea:'Pencegahan kutu',tomorrow:'Esok',vaccine:'Dos penggalak vaksin',weight:'Rekod berat',record:'＋ Tambah rekod',what:'Apa yang mahu direkod?',medicine:'Ubat',vet:'Lawatan vet',symptom:'Gejala',cancel:'Batal'}};
const defaults={pets:[{id:'milo',name:'Milo',species:'cat',birth:'2025-07-21'},{id:'luna',name:'Luna',species:'cat',birth:'2023-07-21'}],records:[{id:'1',petId:'milo',type:'flea',details:'Frontline Plus',date:'2026-07-01',nextDate:'2026-07-22'},{id:'2',petId:'milo',type:'vaccine',details:'FVRCP',date:'2025-08-08',nextDate:'2026-08-08'},{id:'3',petId:'milo',type:'weight',details:'4.8 kg',date:'2026-07-20',nextDate:''}]};let data=JSON.parse(localStorage.pawtrackData||'null')||defaults;let active=localStorage.activePet||data.pets[0].id;const icons={flea:'🛡️',deworm:'🪱',vaccine:'💉',medicine:'💊',vet:'🩺',weight:'⚖️',symptom:'📝'},names={flea:'跳蚤预防',deworm:'驱虫',vaccine:'疫苗',medicine:'药物',vet:'看兽医',weight:'体重记录',symptom:'症状'};function save(){localStorage.pawtrackData=JSON.stringify(data);localStorage.activePet=active;render()}function age(b){if(!b)return'';const y=Math.max(0,new Date().getFullYear()-new Date(b).getFullYear());return y+'岁'}function due(d){if(!d)return'';const days=Math.ceil((new Date(d+'T00:00:00')-new Date().setHours(0,0,0,0))/86400000);return days===0?'今天':days===1?'明天':days<0?`逾期 ${-days} 天`:new Date(d+'T00:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short'})}function render(){const pets=document.querySelector('#pets');pets.innerHTML=data.pets.map(p=>`<button class="pet ${p.id===active?'active':''}" data-pet="${p.id}"><span class="avatar">${p.species==='dog'?'🐕':'🐈'}</span><b>${p.name.replace(/[<>]/g,'')}</b><small>${age(p.birth)}</small></button>`).join('')+'<button class="pet" id="addPet"><span class="avatar">＋</span><b>添加宠物</b></button>';pets.querySelectorAll('[data-pet]').forEach(b=>b.onclick=()=>{active=b.dataset.pet;save()});document.querySelector('#addPet').onclick=()=>open('petForm');const rs=data.records.filter(r=>r.petId===active).sort((a,b)=>(a.nextDate||a.date).localeCompare(b.nextDate||b.date));document.querySelector('#events').innerHTML=rs.length?rs.map(r=>`<article class="event"><div class="icon">${icons[r.type]||'📝'}</div><main><b>${names[r.type]||r.type}</b><small>${(r.details||'').replace(/[<>]/g,'')} · ${r.date}</small></main><span class="due">${due(r.nextDate)}</span></article>`).join(''):'<div class="empty">还没有记录，点击下方按钮开始。</div>'}function open(id){document.querySelector('#'+id).classList.add('open')}function shut(id){document.querySelector('#'+id).classList.remove('open')}const sheet=document.querySelector('#sheet');document.querySelector('#add').onclick=()=>sheet.classList.add('open');document.querySelector('#close').onclick=()=>shut('sheet');sheet.querySelectorAll('.choice').forEach((b,i)=>b.onclick=()=>{shut('sheet');const types=['vaccine','medicine','vet','symptom'];document.querySelector('#recordFormEl [name=type]').value=types[i];open('recordForm')});document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>shut(b.dataset.close));document.querySelectorAll('.sheet').forEach(s=>s.onclick=e=>{if(e.target===s)shut(s.id)});document.querySelector('#petFormEl').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target),id=crypto.randomUUID();data.pets.push({id,name:f.get('name'),species:f.get('species'),birth:f.get('birth')});active=id;save();e.target.reset();shut('petForm')};document.querySelector('#recordFormEl [name=date]').value=new Date().toISOString().slice(0,10);document.querySelector('#recordFormEl').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target);data.records.push({id:crypto.randomUUID(),petId:active,type:f.get('type'),details:f.get('details'),date:f.get('date'),nextDate:f.get('nextDate')});save();e.target.reset();e.target.querySelector('[name=date]').value=new Date().toISOString().slice(0,10);shut('recordForm')};document.querySelector('#lang').onchange=e=>{document.documentElement.lang=e.target.value;document.querySelectorAll('[data-t]').forEach(x=>x.textContent=copy[e.target.value][x.dataset.t]||x.textContent);localStorage.lang=e.target.value};const saved=localStorage.lang||'zh';document.querySelector('#lang').value=saved;document.querySelector('#lang').dispatchEvent(new Event('change'));render();if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
</script>
<script>
function editPet(id){const p=id?data.pets.find(x=>x.id===id):null,form=document.querySelector('#petFormEl');form.reset();form.elements.id.value=p?.id||'';form.elements.name.value=p?.name||'';form.elements.species.value=p?.species||'cat';form.elements.birth.value=p?.birth||'';document.querySelector('#petFormTitle').textContent=p?'修改宠物资料':'添加宠物';document.querySelector('#deletePet').classList.toggle('show',!!p);open('petForm')}
render=function(){const pets=document.querySelector('#pets');pets.innerHTML=data.pets.map(p=>`<button class="pet ${p.id===active?'active':''}" data-pet="${p.id}"><span class="avatar">${p.species==='dog'?'🐕':p.species==='other'?'🐾':'🐈'}</span><b>${p.name.replace(/[<>]/g,'')}</b><small>${age(p.birth)}</small></button>`).join('')+'<button class="pet" id="addPet"><span class="avatar">＋</span><b>添加宠物</b></button>';pets.querySelectorAll('[data-pet]').forEach(b=>b.onclick=()=>{active=b.dataset.pet;save()});document.querySelector('#addPet').onclick=()=>editPet();const rs=data.records.filter(r=>r.petId===active).sort((a,b)=>(a.nextDate||a.date).localeCompare(b.nextDate||b.date));document.querySelector('#events').innerHTML=rs.length?rs.map(r=>`<article class="event"><div class="icon">${icons[r.type]||'📝'}</div><main><b>${names[r.type]||r.type}</b><small>${(r.details||'').replace(/[<>]/g,'')} · ${r.date}</small></main><span class="due">${due(r.nextDate)}</span></article>`).join(''):'<div class="empty">还没有记录，点击下方按钮开始。</div>'}
document.querySelector('#managePet').onclick=()=>editPet(active);
document.querySelector('#petFormEl').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target),existing=f.get('id');if(existing){const p=data.pets.find(x=>x.id===existing);p.name=f.get('name');p.species=f.get('species');p.birth=f.get('birth')}else{const id=crypto.randomUUID();data.pets.push({id,name:f.get('name'),species:f.get('species'),birth:f.get('birth')});active=id}save();e.target.reset();shut('petForm')};
document.querySelector('#deletePet').onclick=()=>{const id=document.querySelector('#petFormEl').elements.id.value,p=data.pets.find(x=>x.id===id);if(data.pets.length===1)return alert('至少需要保留一只宠物。');if(!p||!confirm(`确定移除 ${p.name}？相关健康记录也会一起删除。`))return;data.pets=data.pets.filter(x=>x.id!==id);data.records=data.records.filter(r=>r.petId!==id);active=data.pets[0].id;save();shut('petForm')};
render();
</script></body></html>
